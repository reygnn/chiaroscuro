name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Tests, lint, release build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # gradle-wrapper.jar is intentionally absent from this repo (see
      # feedback_chiaroscuro_gradle_wrapper memory). Instead of ./gradlew we
      # install Gradle 8.13 explicitly and invoke `gradle` directly. The
      # setup-gradle action also wires up the build cache for us.
      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # AGP needs platform-36 (Android 16, the project's compile/target/min SDK).
      # The runner image ships several Android platforms but not necessarily 36.
      #
      # Two-step install: setup-android@v3 puts sdkmanager on PATH and
      # accepts licenses, but its `packages:` input mis-parses multi-line
      # YAML (the whole block ends up as one argument, sdkmanager then
      # cannot find any package). Calling sdkmanager directly in a run
      # step sidesteps that.
      - name: Configure Android SDK tools
        uses: android-actions/setup-android@v3

      - name: Install platform 36 and build-tools 36.0.0
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      # One Gradle invocation builds all three targets, reusing configuration
      # and incremental task outputs. assembleRelease exercises R8/ProGuard so
      # shrinker/rule breakage surfaces in CI instead of only at release time.
      - name: Run tests, lint, and release build
        run: gradle :app:testDebugUnitTest :app:lintDebug :app:assembleRelease --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/test-results/testDebugUnitTest/

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.*
