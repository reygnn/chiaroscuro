name: Unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: JVM unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # gradle-wrapper.jar is intentionally absent from this repo (see
      # feedback_chiaroscuro_gradle_wrapper memory). Instead of ./gradlew we
      # install Gradle 8.13 explicitly and invoke `gradle` directly.
      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      # AGP needs platform-36 (Android 16, the project's compile/target/min SDK).
      # The runner image ships several Android platforms but not necessarily 36,
      # so install it explicitly.
      - name: Install Android SDK platform 36
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-36
            build-tools;36.0.0

      - name: Run unit tests
        run: gradle :app:testDebugUnitTest --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/test-results/testDebugUnitTest/
